<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1226"/>
      <stop offset="0.55" stop-color="#1b1840"/>
      <stop offset="1" stop-color="#2c1a4e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7d774"/>
      <stop offset="1" stop-color="#e0a93f"/>
    </linearGradient>
  </defs>

  <rect width="960" height="280" fill="url(#bg)"/>

  <!-- colonnade (parliament motif) -->
  <g fill="url(#gold)">
    <polygon points="60,78 150,46 240,78" opacity="0.95"/>
    <rect x="55" y="76" width="190" height="9" rx="2"/>
    <rect x="62" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="91" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="120" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="149" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="178" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="207" y="90" width="13" height="140" opacity="0.82"/>
    <rect x="55" y="228" width="190" height="9" rx="2"/>
  </g>

  <!-- title block -->
  <text x="290" y="120" font-size="46" font-weight="700" fill="url(#gold)">算鱼真人议会</text>
  <text x="292" y="152" font-size="19" fill="#cbc7e6">sptler · Claude Code Skill</text>
  <text x="292" y="182" font-size="15" fill="#9a93c4" letter-spacing="3">立骨 · 铸模 · 以界为器 · 以值为尺</text>

  <!-- stat chips -->
  <g font-size="15" font-weight="600">
    <rect x="618" y="58" width="300" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#e0a93f" stroke-opacity="0.4"/>
    <text x="642" y="82" font-size="20" font-weight="700" fill="#f7d774">28</text>
    <text x="682" y="82" fill="#e6e1ff">位带灵魂·记忆的圣人</text>

    <rect x="618" y="104" width="300" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#e0a93f" stroke-opacity="0.4"/>
    <text x="642" y="128" font-size="20" font-weight="700" fill="#f7d774">4</text>
    <text x="670" y="128" fill="#e6e1ff">轨自动降级·按问题重量</text>

    <rect x="618" y="150" width="300" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#e0a93f" stroke-opacity="0.4"/>
    <text x="642" y="174" font-size="20" font-weight="700" fill="#f7d774">6</text>
    <text x="670" y="174" fill="#e6e1ff">大专利场景·专属流程</text>

    <rect x="618" y="196" width="300" height="36" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#e0a93f" stroke-opacity="0.4"/>
    <text x="642" y="220" font-size="20" font-weight="700" fill="#f7d774">1</text>
    <text x="668" y="220" fill="#e6e1ff">脑分饰多角色·非 agent 群</text>
  </g>
</svg>
